<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Countdown to Oct 27, 2027</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap");

      :root {
        --bg-color: #0d0d0d;
        --card-bg: #1e1e20;
        --card-bg-bottom: #18181a;
        --text-color: #ffffff;
        --split-line: #050505;
        --label-color: #666666;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
        overflow: hidden;
      }

      .countdown-wrapper {
        display: flex;
        gap: 30px;
        /* Scale down on smaller screens */
        transform: scale(0.85);
      }

      .time-block {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Flip Card Container */
      .flip-card {
        position: relative;
        width: 240px;
        height: 260px;
        border-radius: 16px;
        perspective: 1200px;
        font-size: 150px;
        font-weight: 700;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      }

      /* Make the Days card wider to fit 3 digits comfortably */
      #days {
        width: 320px;
      }

      /* Common styles for top and bottom halves */
      .top,
      .bottom,
      .flip-top,
      .flip-bottom {
        position: absolute;
        left: 0;
        width: 100%;
        height: 50%;
        overflow: hidden;
        border-radius: 16px;
        background-color: var(--card-bg);
        backface-visibility: hidden;
        transform-style: preserve-3d;
      }

      /* Top halves */
      .top,
      .flip-top {
        top: 0;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        transform-origin: 50% 100%;
        border-bottom: 2px solid var(--split-line);
      }

      /* Bottom halves */
      .bottom,
      .flip-bottom {
        bottom: 0;
        border-top-left-radius: 0;
        border-top-right-radius: 0;
        transform-origin: 50% 0%;
        background-color: var(--card-bg-bottom);
        border-top: 1px solid var(--split-line);
      }

      /* The text inside the halves */
      .top span,
      .bottom span,
      .flip-top span,
      .flip-bottom span {
        position: absolute;
        left: 0;
        width: 100%;
        height: 260px; /* Exact height of the parent card */
        line-height: 260px;
        color: var(--text-color);
        letter-spacing: -2px;
      }

      /* Aligning text to top or bottom */
      .top span,
      .flip-top span {
        top: 0;
      }
      .bottom span,
      .flip-bottom span {
        bottom: 0;
      }

      /* Shadow effects for realism */
      .top::after,
      .bottom::after,
      .flip-top::after,
      .flip-bottom::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
        opacity: 0;
        transition: opacity 0.5s;
      }

      .bottom::after {
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.6) 100%
        );
      }

      /* Animation logic classes */
      .flip-top.animating {
        animation: flipTop 0.5s ease-in forwards;
        z-index: 5;
      }

      .flip-top.animating::after {
        opacity: 1; /* Darkens as it falls */
      }

      .flip-bottom.animating {
        animation: flipBottom 0.5s ease-out forwards;
        z-index: 4;
      }

      @keyframes flipTop {
        0% {
          transform: rotateX(0deg);
        }
        100% {
          transform: rotateX(-90deg);
        }
      }

      @keyframes flipBottom {
        0% {
          transform: rotateX(90deg);
        }
        100% {
          transform: rotateX(0deg);
        }
      }

      /* Labels under the clocks */
      .label {
        margin-top: 30px;
        font-size: 1.2rem;
        color: var(--label-color);
        text-transform: uppercase;
        letter-spacing: 6px;
        font-weight: 700;
      }

      @media (max-width: 1024px) {
        .countdown-wrapper {
          transform: scale(0.6);
          gap: 20px;
        }
      }

      @media (max-width: 600px) {
        .countdown-wrapper {
          transform: scale(0.35);
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="countdown-wrapper">
      <div class="time-block">
        <div class="flip-card" id="days">
          <div class="top"><span>000</span></div>
          <div class="bottom"><span>000</span></div>
        </div>
        <div class="label">Days</div>
      </div>
      <div class="time-block">
        <div class="flip-card" id="hours">
          <div class="top"><span>00</span></div>
          <div class="bottom"><span>00</span></div>
        </div>
        <div class="label">Hours</div>
      </div>
      <div class="time-block">
        <div class="flip-card" id="minutes">
          <div class="top"><span>00</span></div>
          <div class="bottom"><span>00</span></div>
        </div>
        <div class="label">Minutes</div>
      </div>
      <div class="time-block">
        <div class="flip-card" id="seconds">
          <div class="top"><span>00</span></div>
          <div class="bottom"><span>00</span></div>
        </div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <script>
      // Target Date: October 27, 2027
      const targetDate = new Date("October 27, 2027 00:00:00").getTime();

      // Store previous values to know when to trigger flip
      let prevTimes = { days: -1, hours: -1, minutes: -1, seconds: -1 };

      function updateClock() {
        const now = new Date().getTime();
        const difference = targetDate - now;

        if (difference < 0) {
          document.body.innerHTML =
            "<h1 style='font-size: 5rem; color: #fff; letter-spacing: 5px;'>00 : 00 : 00 : 00</h1>";
          return;
        }

        const times = {
          days: Math.floor(difference / (1000 * 60 * 60 * 24)),
          hours: Math.floor(
            (difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
          ),
          minutes: Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60)),
          seconds: Math.floor((difference % (1000 * 60)) / 1000),
        };

        // Format with leading zeros
        const formatted = {
          days: String(times.days).padStart(3, "0"),
          hours: String(times.hours).padStart(2, "0"),
          minutes: String(times.minutes).padStart(2, "0"),
          seconds: String(times.seconds).padStart(2, "0"),
        };

        // Trigger flip for changed units
        for (const unit in times) {
          if (times[unit] !== prevTimes[unit]) {
            flipCard(unit, formatted[unit]);
            prevTimes[unit] = times[unit];
          }
        }
      }

      function flipCard(id, newValue) {
        const card = document.getElementById(id);
        const top = card.querySelector(".top span");
        const bottom = card.querySelector(".bottom span");

        const currentValue = top.innerText;
        if (currentValue === newValue || currentValue === "") {
          // First run setup without animating
          top.innerText = newValue;
          bottom.innerText = newValue;
          return;
        }

        // 1. Create the animating top half (falls down)
        const flipTop = document.createElement("div");
        flipTop.classList.add("flip-top", "animating");
        flipTop.innerHTML = `<span>${currentValue}</span>`;

        // 2. Create the animating bottom half (reveals from behind)
        const flipBottom = document.createElement("div");
        flipBottom.classList.add("flip-bottom", "animating");
        flipBottom.innerHTML = `<span>${newValue}</span>`;

        // 3. Immediately update the static top behind the falling flipTop
        top.innerText = newValue;

        card.appendChild(flipTop);
        card.appendChild(flipBottom);

        // 4. Cleanup and update static bottom once animation finishes
        flipTop.addEventListener("animationend", () => {
          flipTop.remove();
        });

        flipBottom.addEventListener("animationend", () => {
          bottom.innerText = newValue;
          flipBottom.remove();
        });
      }

      // Initialize
      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
